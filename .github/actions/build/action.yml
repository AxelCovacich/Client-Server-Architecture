name: Build Project
description: Configure & build with CMake (with coverage)

runs:
  using: composite
  steps:
    - name: Configure (with coverage)
      shell: bash
      run: |
        cmake -S . -B build \
          -DENABLE_COVERAGE=ON \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_PREFIX_PATH=${GITHUB_WORKSPACE}/deps

    - name: Build
      shell: bash
      run: |
        cmake --build build -- -j$(nproc)
