version: '3.8'
services:
  galileo-server:
    build: .
    ports:
      - "8888:8888"
      - "8888:8888/udp"
      - "8086:8086"
    volumes:
      - galileo-db:/Last_of_Us_System/var/lib
      - galileo-logs:/Last_of_Us_System/var/logs
      - galileo-backup:/Last_of_Us_System/backup
    command: ["stdbuf", "-oL", "build/bin/server"]
  galileo-client:
    build: .
    volumes:
      - galileo-logs:/Last_of_Us_System/var/logs
    environment:
      - SERVER_ADDR=${SERVER_ADDR:-galileo-server}
      - TCP_PORT=${TCP_PORT:-8888}
      - UDP_PORT=${UDP_PORT:-8888}
    command: ["build/bin/client", "${SERVER_ADDR:-galileo-server}", "${TCP_PORT:-8888}", "${UDP_PORT:-8888}"]
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"

volumes:
  galileo-db:
  galileo-logs:
  galileo-backup: