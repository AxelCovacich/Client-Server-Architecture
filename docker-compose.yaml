version: '3.8'
services:
  galileo-server:
    build: .
    ports:
      - "8888:8888"
      - "8888:8888/udp"
      - "8086:8086"
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"