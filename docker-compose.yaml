version: '3.8'
services:
  galileo-server:
    build: .
    ports:
      - "${TCP_PORT:-8888}:${TCP_PORT:-8888}"
      - "${UDP_PORT:-8888}:${UDP_PORT:-8888}/udp"
      - "8086:8086"
    volumes:
      - galileo-db:/Last_of_Us_System/var/lib
      - galileo-logs:/Last_of_Us_System/var/logs
      - galileo-backup:/Last_of_Us_System/backup
    environment:
      - CONFIG_PATH=${CONFIG_PATH:-./etc/config.yaml}
      - TCP_PORT=${TCP_PORT:-8888}
      - UDP_PORT=${UDP_PORT:-8888}
    command: ["stdbuf", "-oL", "build/bin/server", "${CONFIG_PATH:-./etc/config.yaml}", "${TCP_PORT:-8888}", "${UDP_PORT:-8888}"]
  galileo-client:
    build: .
    volumes:
      - galileo-logs:/Last_of_Us_System/var/logs
    environment:
      - SERVER_ADDR=${SERVER_ADDR:-galileo-server}
      - TCP_PORT=${TCP_PORT:-8888}
      - UDP_PORT=${UDP_PORT:-8888}
      - IS_DOCKER=1
    tty: true
    stdin_open: true
    command: ["/bin/bash"]
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"

volumes:
  galileo-db:
  galileo-logs:
  galileo-backup: